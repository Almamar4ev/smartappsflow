name: Build Android AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Capacitor
        run: |
          npm install -g @capacitor/cli
          npm install @capacitor/core @capacitor/android

      - name: Prepare web folder
        run: |
          mkdir -p www
          cp index.html www/index.html

      - name: Init Capacitor
        run: |
          npx cap init "Smart Loan Calculator" "com.smartapps.smartloanadvisor" --web-dir www

      - name: Add Android platform
        run: npx cap add android

      - name: Update target SDK and version code
        run: |
          sed -i 's/minSdkVersion = .*/minSdkVersion = 23/' android/variables.gradle
          sed -i 's/compileSdkVersion = .*/compileSdkVersion = 35/' android/variables.gradle
          sed -i 's/targetSdkVersion = .*/targetSdkVersion = 35/' android/variables.gradle
          sed -i 's/versionCode .*/versionCode 7/' android/app/build.gradle
          sed -i 's/versionName .*/versionName "2.0"/' android/app/build.gradle

      - name: Copy web assets
        run: npx cap copy android

      - name: Print SHA-256 fingerprint
        run: |
          keytool -list -v -keystore ~/.android/debug.keystore -alias androiddebugkey -storepass android -keypass android | grep SHA-256 || echo "Debug keystore not found"

      - name: Build AAB
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew bundleRelease

      - name: Sign AAB
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: android/app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: SmartLoanCalculator-release
          path: android/app/build/outputs/bundle/release/*.aab
