name: Build Android AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Capacitor
        run: |
          npm install -g @capacitor/cli
          npm install @capacitor/core @capacitor/android @capacitor/splash-screen

      - name: Prepare web folder
        run: |
          mkdir -p www
          cp index.html www/index.html

      - name: Init Capacitor
        run: |
          npx cap init "Smart Loan Calculator" "com.smartapps.smartloanadvisor" --web-dir www
          cat > capacitor.config.json <<'CFGEOF'
          {
            "appId": "com.smartapps.smartloanadvisor",
            "appName": "Smart Loan Calculator",
            "webDir": "www",
            "bundledWebRuntime": false,
            "plugins": {
              "SplashScreen": {
                "launchShowDuration": 1200,
                "launchAutoHide": true,
                "backgroundColor": "#3A2A8C",
                "androidScaleType": "CENTER_CROP",
                "showSpinner": false
              }
            }
          }
          CFGEOF

      - name: Add Android platform
        run: npx cap add android

      - name: Add splash screen assets
        run: |
          for d in drawable drawable-port-mdpi drawable-port-hdpi drawable-port-xhdpi drawable-port-xxhdpi drawable-port-xxxhdpi; do
            mkdir -p "android/app/src/main/res/$d"
            if [ -f "splash/$d/splash.png" ]; then
              cp "splash/$d/splash.png" "android/app/src/main/res/$d/splash.png"
            fi
          done
          echo "Splash assets copied"

      - name: Update target SDK and version code
        run: |
          sed -i 's/minSdkVersion = .*/minSdkVersion = 23/' android/variables.gradle
          sed -i 's/compileSdkVersion = .*/compileSdkVersion = 35/' android/variables.gradle
          sed -i 's/targetSdkVersion = .*/targetSdkVersion = 35/' android/variables.gradle
          sed -i 's/versionCode .*/versionCode 23/' android/app/build.gradle
          sed -i 's/versionName .*/versionName "2.3"/' android/app/build.gradle

      - name: Enable edge-to-edge for safe-area support
        run: |
          MAIN_ACTIVITY=$(find android/app/src/main/java -name "MainActivity.java")
          cat > "$MAIN_ACTIVITY" <<'JAVAEOF'
          package com.smartapps.smartloanadvisor;

          import android.os.Bundle;
          import androidx.core.view.WindowCompat;
          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  WindowCompat.setDecorFitsSystemWindows(getWindow(), false);
              }
          }
          JAVAEOF
          echo "MainActivity.java updated for edge-to-edge"

      - name: Sync web app to Android
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/smartloan.keystore

      - name: Print SHA-256 fingerprint
        run: keytool -list -v -keystore android/app/smartloan.keystore -alias ${{ secrets.KEY_ALIAS }} -storepass ${{ secrets.KEYSTORE_PASSWORD }} | grep SHA256

      - name: Build Release AAB
        run: |
          cd android
          ./gradlew bundleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/smartloan.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartLoanCalculator-release
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
