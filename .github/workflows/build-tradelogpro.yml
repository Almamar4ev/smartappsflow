name: Build TradeLog Pro AAB

on:
  push:
    branches: [ main ]
    paths:
      - 'tradelogpro/**'
      - '.github/workflows/build-tradelogpro.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'tradelogpro/**'
      - '.github/workflows/build-tradelogpro.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    # All `run:` steps execute inside the tradelogpro/ project folder so that
    # npm, Capacitor, and Gradle operate on this app only. Steps that use
    # `uses:` (checkout, setup-*, signing, upload) ignore this and take paths
    # relative to the workspace root, so those are written as tradelogpro/... .
    defaults:
      run:
        working-directory: tradelogpro

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Install exactly the locked versions. `npm ci` fails if package.json
      # and package-lock.json disagree, so builds are fully reproducible.
      - name: Install dependencies (locked)
        run: npm ci

      # Gate the build on the financial engine. If any of the accounting
      # tests fail, the whole workflow stops here and no APK/AAB is produced.
      - name: Run financial tests
        run: npm test

      - name: Prepare web folder
        run: |
          mkdir -p www
          cp index.html www/index.html
          # PWA assets: manifest.json and sw.js are required and must exist.
          cp manifest.json www/manifest.json
          cp sw.js www/sw.js
          # Icons are optional for now: copy only if present so the build does
          # not fail before a TradeLog Pro icon has been added.
          [ -f icon-192.png ] && cp icon-192.png www/icon-192.png || echo "icon-192.png not present yet — skipping"
          [ -f icon-512.png ] && cp icon-512.png www/icon-512.png || echo "icon-512.png not present yet — skipping"
          curl -fsSL https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js -o www/xlsx.full.min.js
          curl -fsSL https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js -o www/jspdf.umd.min.js
          curl -fsSL https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js -o www/chart.umd.min.js
          mkdir -p www/fonts
          curl -fsSL https://cdn.jsdelivr.net/fontsource/fonts/ibm-plex-mono@5.2.7/latin-400-normal.woff2 -o www/fonts/ibm-plex-mono-400.woff2
          curl -fsSL https://cdn.jsdelivr.net/fontsource/fonts/ibm-plex-mono@5.2.7/latin-500-normal.woff2 -o www/fonts/ibm-plex-mono-500.woff2
          curl -fsSL https://cdn.jsdelivr.net/fontsource/fonts/ibm-plex-mono@5.2.7/latin-600-normal.woff2 -o www/fonts/ibm-plex-mono-600.woff2
          curl -fsSL https://cdn.jsdelivr.net/fontsource/fonts/ibm-plex-mono@5.2.7/latin-700-normal.woff2 -o www/fonts/ibm-plex-mono-700.woff2
          curl -fsSL https://cdn.jsdelivr.net/fontsource/fonts/dm-sans@5.2.8/latin-400-normal.woff2 -o www/fonts/dm-sans-400.woff2
          curl -fsSL https://cdn.jsdelivr.net/fontsource/fonts/dm-sans@5.2.8/latin-500-normal.woff2 -o www/fonts/dm-sans-500.woff2
          curl -fsSL https://cdn.jsdelivr.net/fontsource/fonts/dm-sans@5.2.8/latin-600-normal.woff2 -o www/fonts/dm-sans-600.woff2
          curl -fsSL https://cdn.jsdelivr.net/fontsource/fonts/dm-sans@5.2.8/latin-700-normal.woff2 -o www/fonts/dm-sans-700.woff2

      - name: Init Capacitor
        run: |
          npx cap init "TradeLog Pro" "com.tradelog.pro" --web-dir www

      - name: Add Android platform
        run: npx cap add android

      - name: Update SDK and version
        run: |
          sed -i 's/minSdkVersion = .*/minSdkVersion = 23/' android/variables.gradle
          sed -i 's/compileSdkVersion = .*/compileSdkVersion = 35/' android/variables.gradle
          sed -i 's/targetSdkVersion = .*/targetSdkVersion = 35/' android/variables.gradle
          sed -i "s/versionCode .*/versionCode ${GITHUB_RUN_NUMBER}/" android/app/build.gradle
          sed -i "s/versionName .*/versionName \"1.0.${GITHUB_RUN_NUMBER}\"/" android/app/build.gradle

      - name: Copy web assets
        run: npx cap sync android

      - name: Build AAB and APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew bundleRelease assembleRelease

      # Decode the base64 signing key into a temporary keystore outside the
      # workspace ($RUNNER_TEMP is a per-job scratch dir, not checked out and
      # not uploaded). tr strips any CR/LF/spaces that break DER length parsing
      # (the "Short read of DER length" error), then base64 --decode writes the
      # raw keystore bytes.
      - name: Decode signing keystore
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          mkdir -p "$RUNNER_TEMP/tradelog-signing"
          printf '%s' "$SIGNING_KEY" \
            | tr -d '\r\n ' \
            | base64 --decode \
            > "$RUNNER_TEMP/tradelog-signing/signing.keystore"
          # Confirm the file exists and is non-empty; print only its size.
          test -s "$RUNNER_TEMP/tradelog-signing/signing.keystore" \
            || { echo "ERROR: decoded keystore is missing or empty"; exit 1; }
          echo "keystore size (bytes): $(stat -c%s "$RUNNER_TEMP/tradelog-signing/signing.keystore")"

      # Prove the keystore, store password and alias all agree, using the
      # JDK 17 already set up above. No -v, so no certificate details leak.
      - name: Verify keystore, password and alias
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
        run: |
          keytool -list \
            -keystore "$RUNNER_TEMP/tradelog-signing/signing.keystore" \
            -storepass:env KEY_STORE_PASSWORD \
            -alias "$KEY_ALIAS"

      # Sign the App Bundle with jarsigner (the standard tool for AAB upload
      # signing) and verify the signature.
      - name: Sign and verify AAB (jarsigner)
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          AAB="android/app/build/outputs/bundle/release/app-release.aab"
          jarsigner \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore "$RUNNER_TEMP/tradelog-signing/signing.keystore" \
            -storepass:env KEY_STORE_PASSWORD \
            -keypass:env KEY_PASSWORD \
            "$AAB" \
            "$KEY_ALIAS"
          jarsigner -verify "$AAB"

      # Sign the APK with the official Android SDK tools: zipalign then
      # apksigner. The newest installed build-tools version is auto-detected.
      - name: Sign and verify APK (zipalign + apksigner)
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          UNSIGNED="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          ALIGNED="android/app/build/outputs/apk/release/app-release-aligned.apk"
          SIGNED="android/app/build/outputs/apk/release/app-release-signed.apk"
          BT_DIR="$(ls -d "$ANDROID_HOME"/build-tools/*/ | sort -V | tail -n 1)"
          BT_DIR="${BT_DIR%/}"
          echo "Using build-tools: $(basename "$BT_DIR")"
          "$BT_DIR/zipalign" -f -p 4 "$UNSIGNED" "$ALIGNED"
          "$BT_DIR/apksigner" sign \
            --ks "$RUNNER_TEMP/tradelog-signing/signing.keystore" \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass env:KEY_STORE_PASSWORD \
            --key-pass env:KEY_PASSWORD \
            --out "$SIGNED" \
            "$ALIGNED"
          "$BT_DIR/apksigner" verify "$SIGNED"

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: TradeLogPro-release
          path: tradelogpro/android/app/build/outputs/bundle/release/app-release.aab

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TradeLogPro-apk
          path: tradelogpro/android/app/build/outputs/apk/release/app-release-signed.apk
