<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>SmartAppsFlow — Smart tools, beautifully simple</title>
<style>
:root{
  --acc:#6366f1;--acc2:#8b5cf6;--acc3:#ec4899;
  --bg:#0a0f1e;--bg2:#1e293b;--bg3:#0f172a;--bg-card:#161f33;
  --brd:#2a3650;--txt:#e2e8f0;--txt2:#9fb1c8;--txt3:#7387a3;
  --safe:#22c55e;--glow:rgba(99,102,241,0.22);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--txt);
  min-height:100vh;min-height:100dvh;overflow-x:hidden;line-height:1.5;
  background-image:radial-gradient(1200px 600px at 50% -200px, rgba(99,102,241,.20), transparent 70%);
}
body[dir="rtl"]{font-family:'Segoe UI',Tahoma,Arial,sans-serif}

.wrap{max-width:760px;margin:0 auto;padding:calc(20px + var(--safe-top)) 20px calc(40px + var(--safe-bottom))}

/* ── top bar ── */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:42px}
.brand{display:flex;align-items:center;gap:11px}
.brand-logo{
  width:42px;height:42px;border-radius:12px;flex-shrink:0;
  background:linear-gradient(135deg,var(--acc),var(--acc2));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 18px var(--glow);
}
.brand-name{font-size:18px;font-weight:900;letter-spacing:-.3px}
.brand-name span{color:var(--acc2)}
.lang-btn{
  display:flex;align-items:center;gap:7px;background:var(--bg2);border:1.5px solid var(--brd);
  color:var(--txt);font:inherit;font-size:13px;font-weight:700;padding:9px 14px;border-radius:11px;cursor:pointer;
}

/* ── hero ── */
.hero{text-align:center;margin-bottom:40px}
.hero h1{font-size:30px;font-weight:900;letter-spacing:-.6px;line-height:1.2;margin-bottom:12px}
.hero h1 .grad{background:linear-gradient(120deg,var(--acc),var(--acc2),var(--acc3));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.hero p{font-size:15px;color:var(--txt2);max-width:440px;margin:0 auto}

/* ── section label ── */
.sec-label{font-size:12px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:var(--txt3);margin:0 4px 16px}

/* ── app grid ── */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:540px){.grid{grid-template-columns:1fr}}

.card{
  position:relative;display:flex;flex-direction:column;
  background:var(--bg-card);border:1.5px solid var(--brd);border-radius:18px;padding:18px;
  text-decoration:none;color:inherit;overflow:hidden;
  transition:transform .18s ease, border-color .18s ease, box-shadow .18s ease;
}
.card.live{cursor:pointer}
.card.live:hover{transform:translateY(-3px);border-color:var(--acc);box-shadow:0 12px 30px rgba(0,0,0,.35)}
.card.soon{opacity:.62}

.card-ic{
  width:50px;height:50px;border-radius:14px;flex-shrink:0;margin-bottom:14px;
  display:flex;align-items:center;justify-content:center;
}
.card-title{font-size:16px;font-weight:800;margin-bottom:5px;letter-spacing:-.2px}
.card-desc{font-size:12.5px;color:var(--txt2);line-height:1.5;flex:1}

.card-foot{display:flex;align-items:center;gap:6px;margin-top:14px;font-size:13px;font-weight:800;color:var(--acc2)}
body[dir="rtl"] .card-foot .arrow{transform:scaleX(-1)}

.badge{
  position:absolute;top:14px;inset-inline-end:14px;
  font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;
  padding:4px 9px;border-radius:7px;
}
.badge.b-live{background:color-mix(in srgb,var(--safe) 16%,transparent);color:var(--safe)}
.badge.b-soon{background:var(--bg3);color:var(--txt3);border:1px solid var(--brd)}

/* ── footer ── */
.foot{text-align:center;margin-top:46px;color:var(--txt3);font-size:12.5px;line-height:1.7}
.foot a{color:var(--txt2);text-decoration:none}
</style>
</head>
<body dir="ltr">
<div class="wrap">

  <div class="topbar">
    <div class="brand">
      <div class="brand-logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4l3 8 4-16 3 8h4"/></svg>
      </div>
      <div class="brand-name">Smart<span>Apps</span>Flow</div>
    </div>
    <button class="lang-btn" onclick="toggleLang()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>
      <span id="lang-label">العربية</span>
    </button>
  </div>

  <div class="hero">
    <h1 id="hero-title">Smart tools, <span class="grad">beautifully simple</span></h1>
    <p id="hero-sub">A growing collection of free, fast, privacy-friendly apps. No sign-up, works offline, installs to your home screen.</p>
  </div>

  <div class="sec-label" id="sec-apps">Available apps</div>
  <div class="grid" id="app-grid"></div>

  <div class="foot">
    <div id="foot-tag">Built with care by SmartAppsFlow</div>
    <div style="margin-top:6px">© <span id="year"></span> SmartAppsFlow</div>
  </div>

</div>

<script>
const APPS=[
  {
    id:'smartloan', live:true, path:'./smartloan/',
    grad:'linear-gradient(135deg,#6366f1,#8b5cf6)',
    icon:'<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>',
    en:{name:'Smart Loan Calculator', desc:'Estimate payments, compare loans, and see the real cost of borrowing.'},
    ar:{name:'حاسبة القروض الذكية', desc:'احسب الأقساط، قارن القروض، واعرف التكلفة الحقيقية للقرض.'}
  },
  {
    id:'tradelogpro', live:false,
    grad:'linear-gradient(135deg,#0ea5e9,#2563eb)',
    icon:'<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l6-6 4 4 8-8"/><path d="M21 7v5h-5"/></svg>',
    en:{name:'TradeLog Pro', desc:'A clean trading journal to track trades, performance, and growth.'},
    ar:{name:'TradeLog Pro', desc:'مفكرة تداول أنيقة لتتبّع الصفقات والأداء والنمو.'}
  },
  {
    id:'smartwallet', live:false,
    grad:'linear-gradient(135deg,#14b8a6,#0d9488)',
    icon:'<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v0H5a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2"/><circle cx="16" cy="13" r="1.5" fill="#fff"/></svg>',
    en:{name:'Smart Wallet', desc:'A personal finance app to manage money, budgets, and spending.'},
    ar:{name:'المحفظة الذكية', desc:'تطبيق مالية شخصية لإدارة أموالك وميزانيتك ومصروفاتك.'}
  }
];

const T={
  en:{langLabel:'العربية', heroTitle:'Smart tools, <span class="grad">beautifully simple</span>',
      heroSub:'A growing collection of well-crafted apps for everyday calculations and tracking. Add them to your home screen and use them like native apps.',
      secApps:'Available apps', open:'Open', soon:'Soon', live:'Live', footTag:'Built with care by SmartAppsFlow'},
  ar:{langLabel:'English', heroTitle:'أدوات ذكية، <span class="grad">بساطة جميلة</span>',
      heroSub:'مجموعة متنامية من التطبيقات المتقنة لحساباتك وتتبّعك اليومي. أضِفها إلى شاشتك الرئيسية واستخدمها كتطبيقات أصلية.',
      secApps:'التطبيقات المتاحة', open:'افتح', soon:'قريباً', live:'متاح', footTag:'صُنع بعناية من SmartAppsFlow'}
};

let lang='en';

function render(){
  const t=T[lang];
  document.documentElement.lang=lang;
  document.body.dir = lang==='ar' ? 'rtl' : 'ltr';
  document.getElementById('lang-label').textContent=t.langLabel;
  document.getElementById('hero-title').innerHTML=t.heroTitle;
  document.getElementById('hero-sub').textContent=t.heroSub;
  document.getElementById('sec-apps').textContent=t.secApps;
  document.getElementById('foot-tag').textContent=t.footTag;

  const grid=document.getElementById('app-grid');
  grid.innerHTML=APPS.map(a=>{
    const info=a[lang];
    const liveCls=a.live?'live':'soon';
    const tag=a.live
      ? `<span class="badge b-live">${t.live}</span>`
      : `<span class="badge b-soon">${t.soon}</span>`;
    const foot=a.live
      ? `<div class="card-foot"><span>${t.open}</span><span class="arrow">→</span></div>`
      : '';
    const tagOpen=a.live?`<a class="card live" href="${a.path}">`:`<div class="card soon">`;
    const tagClose=a.live?`</a>`:`</div>`;
    return `${tagOpen}
      ${tag}
      <div class="card-ic" style="background:${a.grad}">${a.icon}</div>
      <div class="card-title">${info.name}</div>
      <div class="card-desc">${info.desc}</div>
      ${foot}
    ${tagClose}`;
  }).join('');
}

function toggleLang(){ lang = lang==='ar' ? 'en' : 'ar'; render(); }

document.getElementById('year').textContent=new Date().getFullYear();
render();

// Clean up any old service worker registered at the root scope (from the previous single-app setup)
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(function(regs){
    regs.forEach(function(r){
      // unregister only the root-scope SW; app SWs live under their own subfolders
      if(r.scope && (r.scope.endsWith('.net/') || r.scope.endsWith('.io/') || r.scope.endsWith('/')) && !/\/[a-z]/i.test(new URL(r.scope).pathname.slice(1))){
        r.unregister();
      }
    });
  }).catch(function(){});
}

</script>

</body>
</html>
